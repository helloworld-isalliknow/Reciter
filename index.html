<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ⭐关键：PWA + iOS全屏 -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Reciter">

<title>Reciter</title>

<!-- 图标 -->
<link rel="apple-touch-icon" href="apple-touch-icon3.png">
<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    padding-bottom: env(safe-area-inset-bottom);
}

.header {
    text-align: center;
    padding: 15px 10px 5px;
}
.title {
    font-size: 26px;
    font-weight: bold;
}
.time {
    color: gray;
    margin-top: 5px;
}

.select-box {
    text-align: center;
    margin: 15px;
}
select {
    font-size: 18px;
    padding: 8px 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 100px;
}
th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}
th {
    background: #f5f5f5;
}

.bottom-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
}
.btn {
    flex: 1;
    padding: 15px;
    color: white;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
}

.fix { background: #ff8c42; }
.fix.active { background: #ffd1a3; color: black; }
.order { background: #20c997; }
.export { background: #777; }
</style>
</head>

<body>

<div class="header">
    <div class="title">Reciter</div>
    <div class="time" id="time"></div>
</div>

<div class="select-box">
    <select id="monthSelect">
        <option value="All">All</option>
    </select>
</div>

<table id="table">
    <thead>
        <tr>
            <th>Date</th>
            <th>Word 1</th>
            <th>Word 2</th>
            <th>Word 3</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="bottom-bar">
    <div class="btn fix" id="fixBtn" onclick="toggleFix()">Fix</div>
    <div class="btn order" onclick="orderWords()">Order</div>
    <div class="btn export" onclick="exportData()">Export</div>
</div>

<script>
// 初始化月份
const monthSelect = document.getElementById("monthSelect");
for (let i = 1; i <= 12; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.text = "2026-" + String(i).padStart(2, '0');
    monthSelect.appendChild(option);
}

// 时间
function updateTime() {
    document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

// 数据
let data = JSON.parse(localStorage.getItem("reciterData")) || {};
let fixMode = false;

// 渲染表格
function renderTable() {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let selected = monthSelect.value;

    for (let m = 1; m <= 12; m++) {
        if (selected !== "All" && Number(selected) !== m) continue;

        for (let d = 1; d <= 31; d++) {
            let key = `2026-${m}-${d}`;
            let row = document.createElement("tr");

            let dateCell = document.createElement("td");
            dateCell.innerText = key;
            row.appendChild(dateCell);

            let words = data[key] || ["", "", ""];
            for (let i = 0; i < 3; i++) {
                let cell = document.createElement("td");
                cell.innerText = words[i];
                cell.onclick = () => editCell(key, i);
                row.appendChild(cell);
            }

            tbody.appendChild(row);
        }
    }
}

// Fix模式
function toggleFix() {
    fixMode = !fixMode;
    document.getElementById("fixBtn").classList.toggle("active");
}

// 修改
function editCell(key, index) {
    if (!fixMode) return;

    let newWord = prompt("修改单词", data[key]?.[index] || "");
    if (newWord !== null) {
        if (!data[key]) data[key] = ["", "", ""];
        data[key][index] = newWord;
        save();
    }
}

// 排序（完整重排）
function orderWords() {
    let selected = monthSelect.value;
    let words = [];

    for (let key in data) {
        if (selected !== "All" && !key.startsWith(`2026-${selected}-`)) continue;
        words.push(...data[key]);
    }

    words = words.filter(w => w && w.trim() !== "")
                 .sort((a, b) => a.localeCompare(b));

    let index = 0;

    for (let m = 1; m <= 12; m++) {
        if (selected !== "All" && Number(selected) !== m) continue;

        for (let d = 1; d <= 31; d++) {
            let key = `2026-${m}-${d}`;
            data[key] = ["", "", ""];

            for (let j = 0; j < 3; j++) {
                if (index < words.length) {
                    data[key][j] = words[index++];
                }
            }
        }
    }

    save();
}

// 导出
function exportData() {
    let blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reciter.json";
    a.click();
}

// 保存
function save() {
    localStorage.setItem("reciterData", JSON.stringify(data));
    renderTable();
}

monthSelect.onchange = renderTable;
renderTable();
</script>

</body>
</html>
