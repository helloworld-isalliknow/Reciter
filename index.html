<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reciter</title>

<!-- iPhone App Icon -->
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJYAAACWCAMAAADyQ0UqAAAAA1BMVEUAAACnej3aAAAASElEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA4G8G0AABqzWqvwAAAABJRU5ErkJggg==">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

/* Header */
.header {
    text-align: center;
    padding: 15px 10px 5px;
}
.title {
    font-size: 26px;
    font-weight: bold;
}
.time {
    color: gray;
    margin-top: 5px;
}

/* Dropdown */
.select-box {
    text-align: center;
    margin: 10px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 100px;
}
th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
    font-size: 14px;
}
th {
    background: #f5f5f5;
}

/* Bottom buttons */
.bottom-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
}
.btn {
    flex: 1;
    padding: 15px;
    color: white;
    text-align: center;
    font-weight: bold;
    cursor: pointer;
}
.enter { background: #ff6fa5; }
.fix { background: #ff8c42; }
.fix.active { background: #ffd1a3; color: black; }
.order { background: #28a745; }
.export { background: #777; }
</style>
</head>

<body>

<div class="header">
    <div class="title">Reciter</div>
    <div class="time" id="time"></div>
</div>

<div class="select-box">
    <select id="monthSelect">
        <option value="All">All</option>
    </select>
</div>

<table id="table">
    <thead>
        <tr>
            <th>Date</th>
            <th>Word 1</th>
            <th>Word 2</th>
            <th>Word 3</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="bottom-bar">
    <div class="btn enter" onclick="enterWord()">Enter</div>
    <div class="btn fix" id="fixBtn" onclick="toggleFix()">Fix</div>
    <div class="btn order" onclick="orderWords()">Order</div>
    <div class="btn export" onclick="exportData()">Export</div>
</div>

<script>
// 初始化月份
const monthSelect = document.getElementById("monthSelect");
for (let i = 1; i <= 12; i++) {
    let option = document.createElement("option");
    option.value = i;
    option.text = "2026-" + String(i).padStart(2, '0');
    monthSelect.appendChild(option);
}

// 当前时间
function updateTime() {
    document.getElementById("time").innerText = new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

// 数据存储
let data = JSON.parse(localStorage.getItem("reciterData")) || {};
let fixMode = false;

// 初始化表格
function renderTable() {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    let selected = monthSelect.value;

    for (let m = 1; m <= 12; m++) {
        if (selected !== "All" && Number(selected) !== m) continue;

        for (let d = 1; d <= 31; d++) {
            let key = `2026-${m}-${d}`;
            let row = document.createElement("tr");

            let dateCell = document.createElement("td");
            dateCell.innerText = key;
            row.appendChild(dateCell);

            let words = data[key] || ["", "", ""];
            for (let i = 0; i < 3; i++) {
                let cell = document.createElement("td");
                cell.innerText = words[i];
                cell.onclick = () => editCell(key, i);
                row.appendChild(cell);
            }

            tbody.appendChild(row);
        }
    }
}

// Enter
function enterWord() {
    let input = prompt("输入单词（可含释义）");
    if (!input) return;

    let today = new Date();
    let key = `2026-${today.getMonth()+1}-${today.getDate()}`;

    if (!data[key]) data[key] = ["", "", ""];

    for (let i = 0; i < 3; i++) {
        if (!data[key][i]) {
            data[key][i] = input;
            break;
        }
    }

    save();
}

// Fix
function toggleFix() {
    fixMode = !fixMode;
    document.getElementById("fixBtn").classList.toggle("active");
}

// 修改
function editCell(key, index) {
    if (!fixMode) return;

    let newWord = prompt("修改单词", data[key]?.[index] || "");
    if (newWord !== null) {
        if (!data[key]) data[key] = ["", "", ""];
        data[key][index] = newWord;
        save();
    }
}

// Order
function orderWords() {
    let selected = monthSelect.value;
    let words = [];

    for (let key in data) {
        if (selected !== "All" && !key.startsWith(`2026-${selected}-`)) continue;
        words.push(...data[key]);
    }

    words = words.filter(w => w).sort();

    let i = 0;
    for (let key in data) {
        if (selected !== "All" && !key.startsWith(`2026-${selected}-`)) continue;
        for (let j = 0; j < 3; j++) {
            data[key][j] = words[i++] || "";
        }
    }

    save();
}

// Export
function exportData() {
    let blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reciter.json";
    a.click();
}

// 保存
function save() {
    localStorage.setItem("reciterData", JSON.stringify(data));
    renderTable();
}

monthSelect.onchange = renderTable;
renderTable();
</script>

</body>
</html>
